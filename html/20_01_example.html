<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>웹 개발 교육 상담 문의</title>
</head>

<body>
    <header>
    <h1>웹 개발 교육 상담 문의</h1>
    <P>HTML, CSS, JavaScript, Reat, 프론트 엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담장자가 확인 후 안내해드립니다.</p>
    </header>

    <main>
        <fieldset>
            <legend>상담 신청 정보</legend>

            <form action="#" method="get">
                <div>
                    <label for="name">이름 * </label>
                    <input type="text" placeholder="이름을 입력하세요" name="name">

                    <p>실명을 입력해주세요.</p>
                </div>

                <div>
                    <label for="email">이메일 * </label>
                    <input type="text" placeholder="example@gmail.com" name="email">

                    <p>답변을 받을 이메일 주소를 입력해 주세요.</p>
                </div>

                <div>
                    <label for="phone">연락처 </label>
                    <input type="text" placeholder="010-0000-0000" name="phone">
                </div>
                
                <div>
                    <label for="class">관심과정 *</label>
                    <select name="class">
                        <option value="선택">선택하세요.</option>
                        <option value="class1">1번 수업</option>
                        <option value="class2">2번 수업.</option>
                    </select>
                </div>
                
                <div>
                    <label for="CS">문의 내용* </label>
                    <textarea name="CS"  cols="12"  rows="2" placeholder="자세히 입력해주세요."></textarea>  
                    <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
                </div>

                <div>
                    <input type="checkbox" name="개인정보"> <span>개인정보 수집 및 이용에 동의합니다. *</span> <!--해당부분을 뱐걍-->
                    <!--<label for="개인정보">개인정보 수집 및 이용에 동의합니다.</label>-->
                </div>

                <div>
                    <button type="button">상담 문의 보내기</button>
                </div>
            </form>
        </fieldset>
    </main>

</body>
</html>
