<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 개발 교육 상담 문의</title>
</head>
<body>
    <!--header-->
    <header>

    </header>

    <!--main-->
    <main>
        <section>
            <h1>웹 개발 교육 상담 문의</h1>
            <p>HTML, CSS, JavaScript, Reat, 프론트 엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담장자가 확인 후 안내해드립니다.</p>
            <form action="#" method="get">
                <fieldset>
                    <legend>상담 신청 정보</legend>

                    <article> <!--1. 이름-->
                        <label for="name">이름 <sup>*</sup> </label>
                        <input type="text" name="name" placeholder="이름을 입력하세요">
                        <p>실명을 입력해 주세요.</p>
                    </article>

                    <article> <!--2. 이메일-->
                        <label for="email">이메일 <sup>*</sup> </label>
                        <input type="text" name="email" placeholder="example@email.com">
                        <p>답변을 받을 이메일 주소를 입력하세요.</p>
                    </article>

                    <article> <!--3. 연락처-->
                        <label for="phone">연락처</label>
                        <input type="text" name="phone" placeholder="010-0000-0000">
                    </article>

                    <article> <!--4. 관심과정-->
                        <label for="course">관심과정</label>
                        <select name="course">
                            <option value="선택">선택하세요</option>
                            <option value="html_css">HTML/CSS 기초</option>
                            <option value="JavaScript">자바 스크립트 입문</option>
                            <option value="react">react 프론트엔드</option>
                            <option value="fullstack">fullstack 웹 개발</option>
                        </select>
                    </article>

                     <article> <!--5.문의 내용-->
                        <label for="message">문의 내용</label>
                        <textarea name="message" placeholder="궁금한 내용을 자세히 입력해 주세요."></textarea>
                        <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
                    </article>
                    
                    <article> <!--6.개인정보 수집 및 동의-->
                        <input type="checkbox" name="agree">
                        <label for="agree">개인정보 수집 및 이용에 동의합니다.<sup>*</sup> </label>
                    </article>

                    <article>
                        <button type="submit">상담 문의 보내기</button>
                    </article>



                </fieldset>
            </form>
        </section>
    </main>

    <!--footer-->
    <footer>

    </footer>
</body>
</html>
