<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입폼</title>
</head>
<body>
    <h1>회원가입폼</h1><a href="#field2">기타 항목 입력</a>
    <form action="#" method="get">
        <!--
        method : GET / POST
        GET은 GET으로 보내야하고, POST는 POST로 보내야 함
        method에 아무것도 넣지 않으면 알아서 GET 방식으로 넘어감. 그래도 적어서 보내는 것을 권장
        GET : 서버에 데이터 전송 방식으로 URL을 사용함, Query String(쿼리스트링)
            네트웍 패킷 헤더에 함께 전송 (중요한 문서의 경우 사용X,url에 전부 보여짐)
            비유하자면 이름표와 같음(전부 보여짐)
        POST : 서버의 데이터 전송 시 네트웍 패킷의 바디에 함께 전송
        -->

        <fieldset>
            <legend>개인정보입력</legend>
        <ul>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id">
            </li>
            <li>
                <label for="password">비밀번호</label>
                <input type="password" name="password">
                <!--input type을 password로 줘야, 작성 시 비밀번호가 보이지 않음-->
            </li>
            <li>
                <label for="name">이름</label>
                <input type="text" name="name">
                <!--name="@" 은 @에 내가 작성한 것으로 들어감 ex.) name=정예원-->
            </li>

            <br>

            <fieldset>
                <legend>주소 선택 태그</legend>
            <li>
                <label for="address1">주소1</label>
                <input type="text" name="address1">
            </li>
            <li>
                <label for="address2">주소2</label>
                <input type="radio" name="address2" value="서울시"> <span>서울시</span>
                <input type="radio" name="address2" value="대전시"> <span>대전시</span>
                <input type="radio" name="address2" value="부산시"> <span>부산시</span>
                <!--해당과 같이 선택하는 경우에는 name="@" 의 @를 모두 동일하게 작성해야한다.
                전부 다를 경우 3가지 중 하나를 선택하는 것이 아닌 3개를 모두 선택이 가능함-->
            </li>
            <li>    
                <label for="address3">주소3</label>
                <input type="checkbox" name="address3" value="Seoul"> <span>서울시</span>
                <input type="checkbox" name="address3" value="Deajeon"> <span>대전시</span>
                <input type="checkbox" name="address3" value="Busan"> <span>부산시</span>
            </li>
            <li>    
                <label for="address4">주소4</label>
                <select name="address4">
                    <option value="선택">선택하세요</option>
                    <option value="서울시">서울시</option>s
                    <option value="대전시">대전시</option>
                    <option value="부산시">부산시</option>
                </select>
            </li>
            </fieldset>

            <br>

            <li>
                <label for="birthday">생년월일</label>
                <input type="date" name="birthday">
            </li>
            <li>
                <label for="photo">프로필 사진 업로드</label>
                <input type="file" name="photo">
            </li>
            <li>
                <label for="intro">자기 소개</label>
                <textarea name="intro" cols="50"  rows="10" placeholder="200자 이내로 작성"></textarea>
                <!--textarea 역시 인라인 블록 ; 그러기 때문에 글자의 밑 부분에 맞춰짐-->
            </li>
            <li>
                <!--type=""에 아무것도 없을 경우 default : submit-->

                <button type="submit">전송</button>  <!--action으로 이동-->

                <button type="button">가짜 버튼</button> 
                <!--모양만 버튼으로 있는거임(노 이벤트)-->
                <!--JS에서 함수를 체크할 때 이용함-->
                <button type="reset">다시 쓰기</button>
            </li>
        </ul>

        </fieldset>
        <br>
        <fieldset id="field2">
            <legend>기타 항목 입력</legend>
        </fieldset>
    </form>
</body>
</html>
