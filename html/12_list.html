<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <h1>목록 표시 : UL,OL</h1>
    <ul><!--순서를 안 지켜도 됨-->
        <li>Unordered</li>
        <li>Unordered</li>
        <li>Unordered</li>
        <li>Unordered</li>
        <li>Unordered</li>
    </ul>
    <ol><!--순서를 지켜야함-->
        <li>Ordered</li>
        <li>Ordered</li>
        <li>Ordered</li>
        <li>Ordered</li>
        <li>Ordered</li>
    </ol>
</body>
</html>
