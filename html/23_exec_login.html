<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <h1>login form</h1>
    <form action="#" method="get">
        <ul>
            <li>
                <i class="fas fa-crown"></i>
                <li>
                    <img src="../images/ex.png" alt="프로필_이미지" width="200" height="200">
                </li>
            </li>
            <li>
                <label for="name"> <i class="fas fa-envelope-open"></i></label>
                <input type="text" name="name" placeholder="Username">
            </li>
            <li>
                
                <label for="password"><i class="fas fa-lock"></i></label>
                <input type="text" name="password" placeholder="Password">
            </li>
            <li>
                <input type="radio" name="save" value="remember">
                    <span>remember</span>
                <input type="radio" name="save" value="forget">
                    <span>Forget your password?</span>
            </li>
            <li>
                <button>Login</button>
            </li>
        </ul>

    </form>
</body>
</html>
