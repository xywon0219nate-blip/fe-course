<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tablle</title>
</head>
<body>
    <h1>Table</h1>

    <table border="1">
        <thead> <!--시멘틱 태그를 이용한 테이블의 head 부분으로 표기-->
            <tr>
                <th>번호</th> <!--제목을 적는 것처럼 볼드체로 작성됨-->
                <th>상품명</th>
                <th>가격</th>
            </tr>
        </thead>

        <tbody><!--시멘틱 태그를 이용한 테이블의 body 부분으로 표기-->
            <tr>
                <td rowspan="2">1</td>
                <td>모니터</td>
                <td>1000</td>
            </tr>
            <tr>
                <!--<td>2</td>-->
                <td>키보드</td>
                <td>2000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>마우스</td>
                <td>3000</td>
            </tr>
            <tr>
                <td colspan="3">4</td>
                <!--<td colspan="">프린터</td>-->
            </tr>
        </tbody>

        <tfoot><!--시멘틱 태그를 이용한 테이블의 foot 부분으로 표기-->
            <tr>
                <th colspan="2">합계</th>
                <!--<th></th>-->
                <th>6000</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
