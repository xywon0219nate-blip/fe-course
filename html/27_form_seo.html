<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입폼</title>
    <meta name="description" content="회원가입 폼을 작성한 예제입니다.">

</head>
<body>
    <main>
    <h1>회원가입폼</h1><a href="#field2">기타 항목 입력</a>
    <form action="#" method="get">
        
        <!--<fieldset>
            <legend>개인정보입력</legend>-->
        <ul>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id" id="id">
            </li>
            <li>
                <label for="password">비밀번호</label>
                <input type="password" name="password" id="password">
                <!--input type을 password로 줘야, 작성 시 비밀번호가 보이지 않음-->
            </li>
            <li>
                <label for="name">이름</label>
                <input type="text" name="name" id="name">
                <!--name="@" 은 @에 내가 작성한 것으로 들어감 ex.) name=정예원-->
            </li>

            <!--<fieldset>
                <legend>주소 선택 태그</legend>-->
            <li>
                <label for="address1">주소1</label>
                <input type="text" name="address1" id="address1">
            </li>
            <li>
                <label for="address2" name="address2" id="address2">주소2</label>
                <input type="radio" name="address2" value="서울시" id="address2"> <span>서울시</span>
                <input type="radio" name="address2" value="대전시" id="address2"> <span>대전시</span>
                <input type="radio" name="address2" value="부산시" id="address2"> <span>부산시</span>
                <!--해당과 같이 선택하는 경우에는 name="@" 의 @를 모두 동일하게 작성해야한다.
                전부 다를 경우 3가지 중 하나를 선택하는 것이 아닌 3개를 모두 선택이 가능함-->
            </li>
            <li>    
                <label for="address3" name="address3" id="address3">주소3</label>
                <input type="checkbox" name="address3" value="Seoul" id="address3"> <span>서울시</span>
                <input type="checkbox" name="address3" value="Deajeon" id="address3"> <span>대전시</span>
                <input type="checkbox" name="address3" value="Busan" id="address3"> <span>부산시</span>
            </li>
            <li>    
                <label for="address4" name="address4" id="address4">주소4</label>
                <select name="address4" id="address4">
                    <option value="선택" id="address4">선택하세요</option>
                    <option value="서울시" id="address4">서울시</option>
                    <option value="대전시" id="address4">대전시</option>
                    <option value="부산시" id="address4">부산시</option>
                </select>
            </li>
            <!--</fieldset>-->

            <li>
                <label for="birthday">생년월일</label>
                <input type="date" name="birthday" id="birthday">
            </li>
            <li>
                <label for="photo">프로필 사진 업로드</label>
                <input type="file" name="photo" id="photo">
            </li>
            <li>
                <label for="intro">자기 소개</label>
                <textarea name="intro" cols="50"  rows="10" placeholder="200자 이내로 작성" id="intro"></textarea>
                <!--textarea 역시 인라인 블록 ; 그러기 때문에 글자의 밑 부분에 맞춰짐-->
            </li>
            <li>
                <!--type=""에 아무것도 없을 경우 default : submit-->

                <button type="submit">전송</button>  <!--action으로 이동-->

                <button type="button">가짜 버튼</button> 
                <!--모양만 버튼으로 있는거임(노 이벤트)-->
                <!--JS에서 함수를 체크할 때 이용함-->
                <button type="reset">다시 쓰기</button>
            </li>
        </ul>

        <!--</fieldset>-->
        <br>
        <fieldset id="field2">
            <legend>기타 항목 입력</legend>
        </fieldset>
    </form>
    </main>
</body>
</html>
