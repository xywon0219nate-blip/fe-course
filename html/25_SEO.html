<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO</title>
    <meta name="description" content="SEO 개념 익히기">
</head>
<body>
    <!--
    SEO (Search Engine Optimization) - 검색 엔진 최적화
    개념 : 검색엔진에서 상위 노출이 되도록 웹사이트를 최적화하는 기술
    검색엔진 - 구글, 네이버, 다음, 사파리, 엣지 그외 등
    
    SEO 핵심기술
    - HTML5 semantic tag : header, main, footer...
    - title
    - padding
    - meta description
    - contents : img-alt, label-for ...
    
    SEO를 적용  사이트
    - 블로그, 쇼핑몰, 교육사이트...
    -->


    <!--
    <h1>HTML4 Layout</h1>
    <div id="header">header</div>
    <div id="content">content</div>
    <div id="footer">Footer</div>
    -->
    
    <h1>HTML5 Layout</h1>
    <header>header</header>
    <main>main</main>
    <footer>footer</footer>
</body>
</html>
