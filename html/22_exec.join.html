<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>

<body>
    <form action="#" method="get">
        <ul>
            <li>
                <div>필수항목</div>
            </li>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id">
            </li>
            <li>
                <label for="pass">비밀번호</label>
                <input type="password" name="pass">
            </li>
            <li>
                <label for="email">이메일</label>
                <input type="text" name="email" placeholder="example@email.com">
            </li>
            <li>
                <label for="name">성명</label>
                <input type="text" name="name">
            </li>
            <li>
                <label for="age">나이</label>
                <input type="text" name="age">
            </li>
            <li>
                <div>당신에 대해서 알고 싶어요!</div>
            </li>
            <li>
                <label for="hobby">취미를 선택해 주세요</label>
                <input type="radio" name="hobby" value="game"><span>게임하기</span><!--value값이 있어야 서버로 넘어감-->
                <input type="radio" name="hobby" value="music"><span>음악듣기</span>
                <input type="radio" name="hobby" value="ice_drink"><span>아이스음료 마시기</span>
            </li>
            <li>
                <label for="select_drink">좋아하는 음료를 선택해 주세요(중복선택가능)</label>
                <input type="checkbox" name="select_drink" value="shake"><span>쉐이크 종류 음료</span>
                <input type="checkbox" name="select_drink" value="tea"><span>티 종류 음료</span>
                <input type="checkbox" name="select_drink" value="coffee"><span>커피 종류 음료</span>
            </li>
            <li>
                <label for="date">동아리 참석 가능 날짜 : </label>
                <input type="date" name="date" value="date">
            </li>
            <li>
                <label for="group">얼.죽.아에서 참여하고 싶은 모임은? :</label>
                <select name="group" id="group">
                    <option value="defalut">--선택해주세요--</option>
                    <option value="game">게임모임</option>
                    <option value="music">음악감상 모임</option>
                    <option value="running">러닝 모임</option>
                </select>
            </li>
            <li>
                <label for="portfolio">포트폴리오 제출하기</label>
                <button type="button">포트폴리오 업로드</button>
                <input type="file" name="portfolio">
            </li>
            <li>
                <label for="intro">마지막으로 하고 싶은 말은?</label>
                <textarea name="intro" 
                id="intro" 
                placeholder="50자 이내로 작성해주세요"
                cols="50"
                rows="10"></textarea>
            </li>
            <li>
                <button type="reset">다시하기</button>
                <button">전송하기</button>
            </li>
        </ul>

    </form>
</body>
</html>
