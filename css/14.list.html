<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List style</title>
    <meta name="description" content="List style">
    <style>
        ul {
            background-color: aquamarine;
            list-style-type: none;
            padding: 0;
        }
        ol {
            background-color: tomato;
            list-style-type: none; /*맥북 이모지 단축키 control + comman + space bar*/
            padding: 0;
        }
        li {
            background-color: yellow;
        }
        h3 {
            border: 1px solid blue;
        }
    </style>
</head>
<body>
    <h1>list style</h1>
    <ul>
        <h3>Front End</h3>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol>
        <h3>Back End</h3>
        <li>JSP</li>
        <li>LSP</li>
        <li>Node.JS</li>
    </ol>
</body>
</html>
