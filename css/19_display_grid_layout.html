<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Grid Layout</title>
    <meta name="description" content="Display Grid Layout">
    <style>
        div{
            border: 1px solid blue;
        }
        .grid-wrap {
            display: grid;
            /*grid를 사용해야지 아래를 사용할 수 잇다*/
            /**fr의 경우 프레임을 의미한다, 1fr 1fr의 경우 각각 100 중에서 50,50으로 가져감.*/
            /*grid-template-columns: 1fr 1fr 1fr 1fr;*/
            /*grid-template-columns: repeat(4,1fr);*/
            grid-template-columns: 1fr 1fr 1fr 2fr;
            grid-template-rows: 100px auto;
            gap: 10px;
            /*justify-content: center; 셀(border기준 한 박스처럼 보이는 것) 기준 세로 정렬*/
            align-items: end; /*셀 기준 가로 정렬*/
        }
        .list-grid-warp {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            border: 1px solid blue;
            list-style: none;
        }
        .item-grid {
            border: 1px solid red;
            grid-column: span 3; /*컬럼 병합 : 1 / 3 */
            /*이미지 3개의 위치를 병합하여 한 셀이 된다고 생각할 것*/
            /*만약 5로 적을 경우엔 아래 부분을 침범하여 병합함*/
        }

        img[alt="img1"],[alt="img2"] {
            width: 100px;
            height: 100px;
        }
        img[alt="img3"] {
            width: 300px;
        }
    </style>
</head>
<body>
    <h2>Display Grid Layout</h2>
    <div class="grid-wrap">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
    </div>
    <ul class="list-grid-warp"><!--2행2열-->
        <li class="item-grid"><img src="../images/ex.png" alt="img1"></li>
        <li><img src="../images/ex.png" alt="img2"></li>
        <li><img src="../images/Mad_1920774999.jpg" alt="img3"></li>
        <li><img src="../images/ex.png" alt="img2"></li>
        <li><img src="../images/Mad_1920774999.jpg" alt="img3"></li>
        <li><img src="../images/ex.png" alt="img2"></li>
        <li><img src="../images/Mad_1920774999.jpg" alt="img3"></li>
    </ul>
</body>
</html>
