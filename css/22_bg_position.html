<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Positon</title>
    <meta name="description" content="bs_p">
    <style>
        .bg-warp {
            border: 1px solid red;
            width: 100%;
            height: 200px;
            background-image: url("../images/pattern1.jpg");
            background-repeat: no-repeat;
            background-position: 50% 50%; /* %를 사용하는것이 비율을 정해주기 때문에 px을 사용하는 것보다 좋음*/
            background-size: auto; 
            /*size : cover의 경우 가로 세로를 전부 맞춰줌*/
            /*size :display: ; contain의 경우 세로를 기분으로 맞춰줌*/
        }
        .star-bg-warp {
            width: 100%;
            /*height: 640px;*/
            height: 32.3vw; /*viewport : vm = (이미지 출력 높이(px)/vw너비(가로해상도)*100 ) */
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no-repeat;
            background-position: center; /*50% 50%를 문자로 표현 시 같은 의미로 center이 있음*/
            background-size: cover;
        }
    </style>
</head>
<body>
    <h1>background positon</h1>
    <div class="bg-warp"></div>
    <div class="star-bg-warp"></div>
</body>
</html>
