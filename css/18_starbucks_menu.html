<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks</title>
    <meta name="description" content="starbucks">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">


    <style>
        * {
            font-family: 'Nanum Gothic';
            /*background-color: rgb(246,245,239);*/
        }
        /*header 부분*/
        header {
            border: 1px solid red;
            background-color: rgb(246,245,239);
            max-width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }
        .header-logo {
            width: 100px;
            height: 100px;
        }
        .header-menu-top ul,
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            text-decoration: none;
            justify-content: right;
        }
        .header-menu-top ul {
            gap: 20px;
            font-size: .8rem;
        }
        .header-menu-top li:last-child {
            border: 2px solid lightgrey;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            background-color: white;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /*원래는 안 보이게 하고(display: none;) 누르면 나오게 하는 것;JS*/
        .header-menu-top li:last-child input{
            display: none; 
        }
        .header-menu-bottom ul {
            gap: 30px;
        }
        .header-menu-top ul a,
        .header-menu-bottom ul a{
            text-decoration: none;
            color: #333;
        }
        .header-menu-bottom ul a{
            letter-spacing: 1px;
            font-size: .9rem;
        }

        /*main 부분*/
        .main {
            border: 1px solid blue;
            width: 100%;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }
        .star-bg-warp {
            width: 100%;
            /*height: 640px;*/
            height: 32.3vw; /*viewport : vm = (이미지 출력 높이(px)/vw너비(가로해상도)*100 ) */
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no-repeat;
            background-position: center; /*50% 50%를 문자로 표현 시 같은 의미로 center이 있음*/
            background-size: cover;
            display: flex;
            align-items: center; /*가운데로 위치*/
            justify-content: center;
            
        }
        .menu-img {
            position: relative;
            border: 1px solid blue;
            width: 100%;
            height: 32.3vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;  
        }
        /*img1-img5의 공통된 효과 부여*/
        .img0, .img1,.img2, .img3, .img4, .img5, button {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;

        }

        /*스타벅스 홈페이지처럼 하나씩 나오도록 딜레이를 부여*/
        .img0 {
            position: relative;
            animation-delay: 0.5s;
            width: 320px;
            height: auto;
            left: 60px;
            top: -30px;
        }
        .img1 {
            position: relative;
            animation-delay: 1s;
            width: 170px;
            height: auto;
            left: 60px;
        }
        .img2 {
            position: relative;
            animation-delay: 1.5s;
            width: 170px;
            height: auto;
            left: 30px;
            
        }
        .img3 {
            position: relative;
            animation-delay: 2s;
            width: 180px;
            height: auto;
            right: 40px;
        }
        .img4 {
            position: relative;
            animation-delay: 2.5s;
            width: 150px;
            height: auto;
            right: 60px;
        }
        .img5 {
            position: relative;
            animation-delay: 3s;
            width: 150px;
            height: auto;
            right: 100px;
            top: 40px;
        }
        /*버튼 이미지*/
        button {
            transition: background-color 0.4s ease, color 0.4s ease;
            background: none;
            position: absolute;
            width: 120px;
            height: 40px;
            color: rgb(172, 133, 186);
            border: 3px solid rgb(172, 133, 186);
            border-radius: 6px;
            top: 60px;
            right: 120px;
        }
        /*메뉴 이미지 효과*/

        @keyframes fadeInUp{ /*이미지가 서서히 나타나도록~*/
            from{
                opacity: 0; /*안보이다가~*/
            }
            to {
                opacity: 1; /*나중에 보임~*/
            }
        }
        button:hover {
            background-color: rgb(172, 133, 186);
            text-decoration: underline;
            color: white;
        }
        @keyframes changeColor { /*색 변경~*/
            from{
                background: none;
            }
            to {
                background-color: rgb(172, 133, 186);
            }
        }



    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign in</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Custmer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text" name="" id="">
                        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARD</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="main">
        <div class="star-bg-warp">
            <div class="menu-img">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" alt="ico" class="img0">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="ico" class="img1">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" alt="ico" class="img2">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="ico" class="img3">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" alt="ico" class="img4">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="ico" class="img5">
                <button type="button">자세히 보기</button>
            </div>
        </div>
    </main>
</body>
</html>
