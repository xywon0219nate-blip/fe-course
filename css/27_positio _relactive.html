<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>positon-relative</title>
    <meta name="description" content="positon-relative">
    <style>
        h1,div {
            border: 1px solid red;
            position: relative;
        }
        span {
            border: 2px solid blue;
            position: absolute;
            top: 200px; 
            /*top의 기준은 가장 왼쪽 위.(기준 0) +의 값을 주면 화면상의 컨텐츠 기준 아래로,
            -의 값을 주면 컨텐츠 기준 위로 줌 (사라진게 아님)*/
            left: 200px; /*left의 기준은 위에서부터 왼쪽으로 200px*/
        }
    </style>
</head>
<body>
    <h1>positon-relative</h1>
    <div>element_1</div>
    <span>element_2</span>
</body>
</html>
