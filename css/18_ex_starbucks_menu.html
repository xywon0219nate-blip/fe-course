<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks</title>
    <meta name="description" content="Starbucks">
    <style>
        header {
            width: 100%;
            height: auto;
            background-color: antiquewhite;
        }
        .header-top {
            width: 1200px;
            margin: auto;
            text-align: right;
            align-items: center;
            justify-content: space-between;
            display: flex;
            border: 3px solid orchid;
        }
        .header-menu {
            background-color: aquamarine;
        }
        .header-menu-top ul,
        .header-menu-bottom ul{
            list-style: none;
            justify-content: right;
            display: flex
        }
        .header-menu-top {
            border: 1px solid red;
        }
        .header-menu-bottom {
            border: 1px solid blue;
        }
        .header-menu-top ul {
            gap: 30px;
        }
        .header-menu-bottom ul {
            gap: 40px;
        }
        .header-menu-top ul li a,
        .header-menu-bottom ul li a {
            color: #333;
            text-decoration: none;
        }
        .logo{
            width: 100px;
            height: 100px;
            
        }
        .submenu {
            display: none;
            
        }

    </style>
    
</head>
<body>
    <header>
        <div class="header-top">
            <div class="header-logo">
                <img src="	https://www.starbucks.co.kr/common/img/common/logo.png" alt="logo" class="logo">
            </div>
            <div class="header-menu">
                <!--이 부분에 header-menu가 없다면 menu-top과 menu-bottom이 옆으로 나란히 됨-->
                <nav class="header-menu-top">
                    <ul>
                        <li><a href="#">Sign in</a></li>
                        <li><a href="#">My Starbucks</a></li>
                        <li><a href="#">Customer Service & Ideas</a></li>
                        <li><a href="#">Find a Store</a></li>
                        <li><a href="#">돋보기</a></li>
                    </ul>
                </nav>
                <nav class="header-menu-bottom"> 
                    <ul class="main-menu">
                        <li class="menu-item">
                            <a href="#" class="coffee">COFFEE</a>
                            <div class="submenu">
                                <div class="submenu-inner">
                                    <dl>
                                        <dt>커피</dt>
                                        <dd><a href="#">스타벅스 원두</a></dd>
                                        <dd><a href="#">스타벅스 비아</a></dd>
                                        <dd><a href="#">스타벅스 오리가미</a></dd>
                                        <dd><a href="#">스타벅스앳홈 by 캡슐</a></dd>
                                        <dd><a href="#">나와 어울리는 커피</a></dd>
                                    </dl>
                                    <dl>
                                        <dt>커피</dt>
                                        <dd><a href="#">스벅</a></dd>
                                        <dd><a href="#">스벅</a></dd>
                                        <dd><a href="#">스벅</a></dd>
                                    </dl>
                                </div>
                            </div>
                        </li>
                        <li><a href="#">MENU</a></li>
                        <li><a href="#">STORE</a></li>
                        <li><a href="#">ESG</a></li>
                        <li><a href="#">STARBUCKS REWARDS</a></li>
                        <li><a href="#">CORPORATE SALES</a></li>
                        <li><a href="#">WHAT'S NEW</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
</body>
</html>
