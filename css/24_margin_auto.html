<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin-auto</title>
    <meta name="description" content="Margin-auto">
    <style>
        h1 {
            width: 1000px;
            height: 200px;
            background-color: aquamarine;
            margin: auto; /*알아서 좌우정렬*/
        }
        div {
            width: 100%;
            height: 500px;
            background-color: blue;
        }
        p {
            width: 800px;
            margin: auto;
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <h1>Margin-auto</h1>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
            Culpa illo numquam modi porro quaerat! Aspernatur quod, 
            in distinctio deleniti fugit delectus perferendis eligendi 
            totam accusantium exercitationem explicabo cum libero impedit.</p>
    </div>
</body>
</html>
