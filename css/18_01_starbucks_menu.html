<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks</title>
    <meta name="description" content="starbucks">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">


    <style>
        * {
            font-family: 'Nanum Gothic';
            background-color: rgb(246,245,239);
        }
        header {
            border: 1px solid red;
            width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }
        .header-menu-top ul,
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            text-decoration: none;
            justify-content: right;
        }
        .header-menu-top ul {
            gap: 20px;
            font-size: .8rem;
        }
        .header-menu-top li:last-child {
            border: 2px solid lightgrey;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            background-color: white;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /*원래는 안 보이게 하고(display: none;) 누르면 나오게 하는 것;JS*/
        .header-menu-top li:last-child input{
            display: none; 
        }
        .header-menu-bottom ul {
            gap: 30px;
        }
        .header-menu-top ul a,
        .header-menu-bottom ul a{
            text-decoration: none;
            color: #333;
        }
        .header-menu-bottom ul a{
            letter-spacing: 1px;
            font-size: .9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign in</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Custmer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text" name="" id="">
                        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARD</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
